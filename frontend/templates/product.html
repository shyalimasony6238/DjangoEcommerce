{% extends 'index.html' %}
{% block content %}
<style>
  /* 🔹 Heading Styling */
  h1.product-heading {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 700;
    color: #2c3e50;
    margin: 40px 0 50px 0;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* 🔹 Card Styling */
  .card {
    margin-bottom: 30px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border-radius: 15px;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
  }

  .card img {
    height: 400px;
    object-fit: cover;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
  }

  .card-title {
    font-weight: 600;
    color: #34495e;
  }

  .btn-success {
    border-radius: 10px;
    padding: 8px 15px;
  }
</style>

<h1 class="product-heading">Our Products</h1>

<div class="container">
  <div class="row">
    {% for i in products %}
      <div class="col-lg-3 col-md-4 col-sm-6 d-flex justify-content-center">
        <div class="card" style="width: 18rem;">
          <img src="{{ i.p_image.url }}" class="card-img-top" alt="{{ i.pro_name }}">
          <div class="card-body text-center">
            <h5 class="card-title">{{ i.pro_name }}</h5>
            <p class="card-text">Quantity: {{ i.qty }}</p>
            <p class="card-text text-success fw-bold">₹{{ i.price }}</p>
            <a href="{% url 'view_cart'  %}" class="btn btn-success">Add to Cart</a>

          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
