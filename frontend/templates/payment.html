{% extends 'index.html' %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white text-center">
            <h2>Secure Payment</h2>
        </div>
        <div class="card-body text-center">
            <p class="lead">Complete your purchase safely with Razorpay.</p>
            
            <button id="pay-btn" class="btn btn-lg btn-success px-5 py-2">
                <i class="fas fa-credit-card"></i> Pay Now
            </button>
            
            <div class="mt-4">
                <small class="text-muted">
                    Amount: ₹{{ payment.amount|floatformat:2 }}  
                    <br>
                    Order ID: {{ payment.id }}
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "{{ settings.RAZORPAY_KEY_ID }}",
    "amount": "{{ payment.amount }}",
    "currency": "INR",
    "name": "My Shop",
    "description": "Order Payment",
    "order_id": "{{ payment.id }}",
    "theme": {
        "color": "#3399cc"
    },
    "handler": function (response){
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = "{% url 'payment_success' %}";

        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'razorpay_order_id';
        input.value = response.razorpay_order_id;

        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
    }
};

var rzp = new Razorpay(options);

document.getElementById('pay-btn').onclick = function(e){
    rzp.open();
    e.preventDefault();
}
</script>

{% endblock %}
